name: Deploy Angular to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Clean dist
        run: rm -rf dist

      - name: Install dependencies
        run: npm ci

      - name: Build Angular app
        run: |
          npm run build -- \
          --configuration production \
          --output-hashing=all \
          --base-href=/Practice-Angular/

      - name: Verify build output
        run: ls -R dist

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: dist/angular-project/browser
          clean: true