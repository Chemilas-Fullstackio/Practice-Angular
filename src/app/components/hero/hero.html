<section class="hero" [ngStyle]="{ 'background-image': 'url(' + imageUrl + ')' }">
    <div class="overlay">
        <h1 [innerHTML]="title"></h1>
        @if (subtitle) {
             <p>{{subtitle}}</p>
            }
        @if (buttonText) {
             <button>{{buttonText}}</button>
            }
    </div>
</section>
