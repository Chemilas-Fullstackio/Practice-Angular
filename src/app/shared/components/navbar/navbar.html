<nav class="navbar">
  <div class="logo">{{ brandName }}</div>

  <ul class="nav-links">
    @for (tab of navigationTabs; track tab.route) {
      <li>
        <a [routerLink]="tab.route">
          {{ tab.label }}
        </a>
      </li>
    }
  </ul>

  <div class="flex items-center">
    <button class="contact-button">
      Contact Us
    </button>

    <button (click)="toggleMenu()" class="mobile-toggle">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        @if (!isMenuOpen()) {
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" />
        } @else {
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        }
      </svg>
    </button>
  </div>
</nav>

<div class="mobile-dropdown"
     [class.scale-100]="isMenuOpen()"
     [class.opacity-100]="isMenuOpen()"
     [class.scale-95]="!isMenuOpen()"
     [class.opacity-0]="!isMenuOpen()"
     [class.pointer-events-none]="!isMenuOpen()">

  @for (tab of navigationTabs; track tab.route) {
    <a [routerLink]="tab.route" (click)="toggleMenu()">
      {{ tab.label }}
    </a>
  }
</div>

<a href="tel:+919999999999"
   style="background-color: #c6f54a !important; position: fixed; bottom: 24px; right: 24px; z-index: 99999; width: 56px; height: 56px;"
   class="floating-contact-btn items-center justify-center rounded-full shadow-2xl transition-transform active:scale-95">

  <svg xmlns="http://www.w3.org/2000/svg"
       style="width: 24px; height: 24px; color: #004526;"
       fill="none"
       viewBox="0 0 24 24"
       stroke="currentColor">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M3 5a2 2 0 012-2h2.28a2 2 0 011.94 1.515l.516 2.064a2 2 0 01-.45 1.94l-1.27 1.27a16.001 16.001 0 006.586 6.586l1.27-1.27a2 2 0 011.94-.45l2.064.516A2 2 0 0121 16.72V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" />
  </svg>
</a>
